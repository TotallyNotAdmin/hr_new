version: "3.8"
services:
  backend:
    build: ./backend
    container_name: hr-backend
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - app-net

  frontend:
    build: ./frontend
    container_name: hr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge